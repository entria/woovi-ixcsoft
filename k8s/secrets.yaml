apiVersion: v1
kind: Secret
metadata:
  name: service-ixcsoft-secrets
  namespace: service-ixcsoft
type: Opaque
stringData:
  APP_ENV: staging
  NODE_ENV: production
  PORT: "3000"

  # Redis
  REDIS_HOST: redis://redis.woovi-dev.svc.cluster.local:6379

  # IXC Soft — preencher por ISP
  IXCSOFT_BASE_URL: https://CLIENTE.ixcsoft.com.br/webservice/v1
  IXCSOFT_TOKEN: USER_ID:TOKEN
  IXCSOFT_FILIAL_ID: "1"
  IXCSOFT_CONTA_ID: "1"

  # Woovi
  WOOVI_APP_ID: SEU_APP_ID
  WOOVI_WEBHOOK_SECRET: SEU_WEBHOOK_SECRET
  WOOVI_API_URL: https://api.woovi.com.br

  # Cron: a cada hora (pode usar "*/10 * * * *" para testes)
  POLL_INTERVAL_CRON: "0 * * * *"

  # Observabilidade
  ELASTIC_APM_SERVICE_NAME: service-ixcsoft
  ELASTIC_APM_ACTIVE: "true"
  ELASTIC_APM_ENVIRONMENT: staging
  ELASTIC_APM_SERVER_URL: http://apm-server.elk-apm.svc:8200
  ELASTIC_APM_SECRET_TOKEN: SEU_APM_TOKEN
  ELASTIC_APM_TRANSACTION_IGNORE_URLS: /status,/status/*
