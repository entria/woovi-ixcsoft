apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: service-ixcsoft
  name: service-ixcsoft
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  selector:
    matchLabels:
      app: service-ixcsoft
  template:
    metadata:
      labels:
        app: service-ixcsoft
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: service-ixcsoft
          image: registry.dev1.woovi.corp:8010/woovi/service-ixcsoft:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
            limits:
              cpu: "2000m"
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: service-ixcsoft-secrets
          command:
            - node
            - service-ixcsoft.js
          startupProbe:
            httpGet:
              path: /status?src=startupProbe
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /status?src=readinessProbe
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /status?src=livenessProbe
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
